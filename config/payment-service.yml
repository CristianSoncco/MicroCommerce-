# Configuracion para Payment Service
# Configuration for Payment Service

server:
  port: 8084

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5434/paymentdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

stripe:
  api:
    key: ${STRIPE_API_KEY:sk_test_placeholder}
    base-url: ${STRIPE_API_BASE_URL:https://api.stripe.com/v1}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    circuitbreakers:
      enabled: true
