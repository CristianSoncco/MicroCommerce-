# Configuración compartida por todos los microservicios
# Shared configuration for all microservices

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

