# Docker Compose for local development
# Docker Compose para desarrollo local
#  
# Este archivo es para desarrollo local SOLAMENTE
# This file is for local development ONLY
#
# IMPORTANTE: Copia .env.example a .env antes de ejecutar
# IMPORTANT: Copy .env.example to .env before running
#
# Para iniciar todos los servicios de infraestructura:
# To start all infrastructure services:
#   docker-compose -f docker-compose-dev.yml up -d
#
# Para detener:
# To stop:
#   docker-compose -f docker-compose-dev.yml down

version: '3.8'

services:
  # PostgreSQL for Product Service
  postgres-product:
    image: postgres:16-alpine
    container_name: postgres-product
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - product-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microcommerce-network

  # PostgreSQL for User Service
  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB: ${USER_POSTGRES_DB:-userdb}
      POSTGRES_USER: ${USER_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - user-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microcommerce-network

  # PostgreSQL for Payment Service
  postgres-payment:
    image: postgres:16-alpine
    container_name: postgres-payment
    environment:
      POSTGRES_DB: ${PAYMENT_POSTGRES_DB:-paymentdb}
      POSTGRES_USER: ${PAYMENT_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${PAYMENT_POSTGRES_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - payment-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microcommerce-network

  # MongoDB for Order Service
  mongo-order:
    image: mongo:7-jammy
    container_name: mongo-order
    ports:
      - "27017:27017"
    volumes:
      - order-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microcommerce-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: redis-product
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - microcommerce-network

  # RabbitMQ for event-driven communication
  # RabbitMQ para comunicacion basada en eventos
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microcommerce-network

  # Elasticsearch - log storage and indexing / almacenamiento e indexacion de logs
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - microcommerce-network

  # Logstash - log ingestion pipeline / pipeline de ingesta de logs
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.2
    container_name: logstash
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "5000:5000/tcp"
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - microcommerce-network

  # Kibana - log visualization UI / interfaz de visualizacion de logs
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - microcommerce-network

volumes:
  product-data:
    driver: local
  user-data:
    driver: local
  payment-data:
    driver: local
  order-mongo-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  elasticsearch-data:
    driver: local

networks:
  microcommerce-network:
    driver: bridge
